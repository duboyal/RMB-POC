services:
  api:
    build: ./app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./app
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    command: python -u app/watcher.py