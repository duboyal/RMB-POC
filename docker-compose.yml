services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: rmb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./data:/data
    depends_on:
      - postgres
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./app
    volumes:
      - ./app:/app
      - ./data:/data
    depends_on:
      - postgres
    command: python watcher.py

volumes:
  postgres_data: